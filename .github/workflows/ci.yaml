name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install development dependencies
        run: pip install -r requirements-dev.txt

      - name: Train model
        run: python ml/train.py

      - name: Run tests
        run: pytest

      - name: Run lint checks
        run: ruff check .

      - name: Run Bandit security scan
        run: bandit -r app ml

      - name: Run dependency audit (production)
        run: pip-audit -r requirements.txt

      - name: Run dependency audit (development)
        run: pip-audit -r requirements-dev.txt

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes namespace
        run: kubectl apply --dry-run=client -f k8s/namespace.yaml

      - name: Validate Kubernetes service
        run: kubectl apply --dry-run=client -f k8s/service.yaml

      - name: Validate Kubernetes deployment
        run: kubectl apply --dry-run=client -f k8s/deployment.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint helm/ai-log-anomaly-detection

      - name: Render Helm templates
        run: helm template ai-log-anomaly-detection helm/ai-log-anomaly-detection