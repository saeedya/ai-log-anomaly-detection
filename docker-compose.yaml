services:
  app:
    build: .
    container_name: ai-log-anomaly-app
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "AI Log Anomaly Detection API"
      MODEL_PATH: "models/isolation_forest.pkl"
      LOG_LEVEL: "INFO"

  prometheus:
    image: prom/prometheus:latest
    container_name: ai-log-anomaly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - ./monitoring/alerts.yaml:/etc/prometheus/alerts.yaml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: ai-log-anomaly-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  traffic-generator:
    build: .
    container_name: ai-log-anomaly-traffic-generator
    command: ["python", "scripts/generate_traffic.py"]
    environment:
      PREDICT_URL: "http://app:8000/predict"
      SLEEP_SECONDS: "2"
    depends_on:
      - app
  
  alertmanager:
    image: prom/alertmanager:latest
    container_name: ai-log-anomaly-alertmanager
    ports:
      - "9093:9093"