{{- if .Values.customAutoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-log-anomaly-detection-custom
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-log-anomaly-detection
  minReplicas: {{ .Values.customAutoscaling.minReplicas }}
  maxReplicas: {{ .Values.customAutoscaling.maxReplicas }}
  metrics:
    - type: Pods
      pods:
        metric:
          name: {{ .Values.customAutoscaling.metricName }}
        target:
          type: AverageValue
          averageValue: {{ .Values.customAutoscaling.averageValue | quote }}
{{- end }}