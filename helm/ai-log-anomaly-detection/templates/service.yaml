apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-log-anomaly-detection.fullname" . }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "ai-log-anomaly-detection.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: {{ .Values.service.type }}