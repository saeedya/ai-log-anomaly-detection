apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-log-anomaly-detection
  namespace: ai-log-anomaly
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-log-anomaly-detection
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70